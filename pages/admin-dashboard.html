<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Admin · BecasAndalucía</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .admin-nav { display:flex; gap:10px; margin-bottom: 20px; justify-content: center;}
    .stat-card { background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 24px; text-align: center;}
    .stat-card h3 { font-size: 2.5rem; margin:0 0 8px 0; color: var(--primary-light)}
    .stat-card p { margin:0; color: var(--text-secondary); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;}
  </style>
</head>
<body class="dashboard-page" style="display:none;" id="adminBody"> <!-- Hidden until auth logic confirms admin -->

<header class="header">
  <div class="header-inner">
    <a href="../index.html" class="logo">
      <div class="logo-icon">🎓</div><span class="logo-text">BecasAndalucía Admin</span>
    </a>
    <div class="header-actions">
      <a href="dashboard.html" class="btn btn-ghost btn-sm">Volver al sitio</a>
      <button class="btn btn-secondary btn-sm" onclick="handleSignOut()">Salir</button>
    </div>
  </div>
</header>

<section class="dashboard-hero" style="padding: 20px 0;">
  <div class="dashboard-hero-inner">
    <h1 style="text-align:center; font-size: 1.8rem; margin-bottom:15px">Panel de Control 🛡️</h1>
    <nav class="admin-nav">
      <a href="admin-dashboard.html" class="btn btn-primary btn-sm">Resumen Global</a>
      <a href="admin-usuarios.html" class="btn btn-ghost btn-sm">👥 Usuarios</a>
      <a href="admin-incidencias.html" class="btn btn-ghost btn-sm">💬 Incidencias</a>
    </nav>
  </div>
</section>

<div class="main-layout" style="display:block; max-width:900px; margin:0 auto; padding-top:10px">
  <div class="becas-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
    <div class="stat-card">
      <h3 id="statUsers">--</h3>
      <p>Usuarios Registrados</p>
    </div>
    <div class="stat-card">
      <h3 id="statAlerts">--</h3>
      <p>Alertas Activas</p>
    </div>
    <div class="stat-card">
      <h3 id="statIncidencias">--</h3>
      <p>Incidencias Ptes.</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>
<script>
  // Carga local de stats
  document.addEventListener('DOMContentLoaded', async () => {
    const isAdmin = await requireAdmin();
    if (!isAdmin) return;

    // Fetch Usuarios
    const { count: cUsers } = await supabaseClient.from('perfiles').select('*', { count: 'exact', head: true });
    // Fetch Alertas
    const { count: cAlerts } = await supabaseClient.from('filtros_guardados').select('*', { count: 'exact', head: true }).eq('activo', true);
    // Fetch Incidencias pendientes
    const { count: cIncidencias } = await supabaseClient.from('incidencias').select('*', { count: 'exact', head: true }).eq('estado', 'pendiente');

    document.getElementById('statUsers').textContent = cUsers || 0;
    document.getElementById('statAlerts').textContent = cAlerts || 0;
    document.getElementById('statIncidencias').textContent = cIncidencias || 0;
  });
</script>
</body>
</html>
