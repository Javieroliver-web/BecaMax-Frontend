<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Usuarios · BecaMax Admin</title>
  <link rel="icon" type="image/png" href="../img/logo.png">
  <link rel="stylesheet" href="../css/styles.css">
</head>
<body class="dashboard-page">

  <!-- ===== HEADER ===== -->
  <header class="header">
    <div class="header-inner">
      <a href="../index.html" class="logo">
        <img src="../img/logo.png" alt="BX" class="logo-img" style="height:32px;width:32px;border-radius:6px;object-fit:cover;">
        <span class="logo-text">BecaMax Admin</span>
      </a>
      <div class="header-actions">
        <a href="dashboard.html" class="btn btn-ghost btn-sm">⬅️ Volver al Dashboard</a>
      </div>
    </div>
  </header>

  <main class="dashboard-content" style="padding-top:100px;">
    <div class="dashboard-section">
      <div class="section-header">
        <h2 class="section-title">🛡️ Panel de Administración</h2>
        <span class="section-count" id="userCount">0 usuarios</span>
      </div>
      
      <div class="glass-card" style="padding:0; overflow:hidden;">
        <table class="admin-table" id="usersTable">
          <thead>
            <tr>
              <th>ID Usuario</th>
              <th>Estudio</th>
              <th>Región</th>
              <th>Área</th>
              <th>Rol</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="usersList">
            <!-- Cargado por JS -->
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="footer">
    <p>BecaMax Admin · 2026</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const session = await requireAuth();
      if (!session) return;

      // Verificar que realmente es admin
      const { data: perfil } = await supabaseClient
        .from('perfiles')
        .select('rol')
        .eq('user_id', session.user.id)
        .single();

      if (!perfil || perfil.rol !== 'admin') {
        alert('Acceso denegado. No tienes permisos de administrador.');
        window.location.href = 'dashboard.html';
        return;
      }

      cargarUsuarios();
    });

    async function cargarUsuarios() {
      const { data, error } = await supabaseClient
        .from('perfiles')
        .select('*')
        .order('updated_at', { ascending: false });

      if (error) {
        console.error('Error cargando usuarios:', error);
        return;
      }

      document.getElementById('userCount').textContent = `${data.length} usuarios`;
      const list = document.getElementById('usersList');
      list.innerHTML = data.map(u => `
        <tr>
          <td title="${u.user_id}">${u.user_id.substring(0,8)}...</td>
          <td>${u.tipo_estudio || '—'}</td>
          <td>${u.region || '—'}</td>
          <td>${u.area || '—'}</td>
          <td><span class="badge ${u.rol === 'admin' ? 'badge-urgente' : 'badge-tipo'}">${u.rol.toUpperCase()}</span></td>
          <td>
            <button class="btn btn-ghost btn-sm" onclick="alert('Funcionalidad en desarrollo')">⚙️</button>
          </td>
        </tr>
      `).join('');
    }
  </script>

  <style>
    .admin-table { width: 100%; border-collapse: collapse; text-align: left; }
    .admin-table th, .admin-table td { padding: 16px; border-bottom: 1px solid var(--glass-border); }
    .admin-table th { background: rgba(255,255,255,0.05); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
    .admin-table tr:hover { background: rgba(255,255,255,0.02); }
    .badge-urgente { background: #ef4444; color: white; }
  </style>
</body>
</html>
