<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Usuarios · BecaMax</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="stylesheet" href="../css/styles.css">
  <style>
    .admin-nav { display:flex; gap:10px; margin-bottom: 20px; justify-content: center;}
    .admin-table { width: 100%; border-collapse: collapse; background: var(--card-bg); border-radius: 8px; overflow: hidden; font-size:0.9rem;}
    .admin-table th, .admin-table td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
    .admin-table th { background: rgba(255,255,255,0.03); color: var(--text-secondary); font-weight: 500;}
  </style>
</head>
<body class="dashboard-page" style="display:none;" id="adminBody">

<header class="header">
  <div class="header-inner">
    <a href="../index.html" class="logo">
      <div class="logo-icon">🎓</div><span class="logo-text">BecasMax Admin</span>
    </a>
    <div class="header-actions">
      <a href="dashboard.html" class="btn btn-ghost btn-sm">Volver al sitio</a>
      <button class="btn btn-secondary btn-sm" onclick="handleSignOut()">Salir</button>
    </div>
  </div>
</header>

<section class="dashboard-hero" style="padding: 20px 0;">
  <div class="dashboard-hero-inner">
    <h1 style="text-align:center; font-size: 1.8rem; margin-bottom:15px">Gestión de Usuarios</h1>
    <nav class="admin-nav">
      <a href="admin-dashboard.html" class="btn btn-ghost btn-sm">Resumen Global</a>
      <a href="admin-usuarios.html" class="btn btn-primary btn-sm">👥 Usuarios</a>
      <a href="admin-incidencias.html" class="btn btn-ghost btn-sm">💬 Incidencias</a>
    </nav>
  </div>
</section>

<div class="main-layout" style="display:block; max-width:900px; margin:0 auto; padding-top:10px">
  <div style="overflow-x:auto;">
    <table class="admin-table">
      <thead>
        <tr>
          <th>ID Usuario</th>
          <th>Nivel Estudios</th>
          <th>Región</th>
          <th>Rol</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="usersTableBody">
        <tr><td colspan="5" style="text-align:center; color:var(--text-muted)">Cargando...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/admin.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    const isAdmin = await requireAdmin();
    if (!isAdmin) return;

    cargarUsuarios();
  });

  async function cargarUsuarios() {
    const { data: users, error } = await supabaseClient.from('perfiles').select('*').order('updated_at', { ascending: false });
    const tbody = document.getElementById('usersTableBody');
    if (error) {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:red">Error cargando usuarios</td></tr>`;
      return;
    }
    
    tbody.innerHTML = users.map(u => `
      <tr>
        <td style="font-family:monospace; font-size:0.8rem">${u.user_id.split('-')[0]}...</td>
        <td>${u.tipo_estudio || '-'}</td>
        <td>${u.region || '-'}</td>
        <td><span class="badge" style="background:${u.rol==='admin'?'var(--primary)':'rgba(255,255,255,0.1)'}">${u.rol}</span></td>
        <td>
          <button class="btn btn-ghost btn-sm" style="padding:4px 8px; font-size:0.8rem" onclick="toggleRole('${u.user_id}', '${u.rol}')">
            Set ${u.rol === 'admin' ? 'User' : 'Admin'}
          </button>
        </td>
      </tr>
    `).join('');
  }

  async function toggleRole(userId, currentRole) {
    const newRole = currentRole === 'admin' ? 'user' : 'admin';
    const { error } = await supabaseClient.from('perfiles').update({ rol: newRole }).eq('user_id', userId);
    if (!error) {
      showToast('Rol actualizado a ' + newRole, 'success');
      cargarUsuarios();
    } else {
      showToast('Error al actualizar rol', 'error');
    }
  }
</script>
</body>
</html>
